name: impact_calc

on:
  schedule:
    # 毎時 05 分に実行
    - cron: "5 * * * *"
  workflow_dispatch:

concurrency:
  group: impact_calc
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Restore SQLite DB (cache)
        uses: actions/cache@v4
        with:
          path: data/news_signal.sqlite3
          key: news-signal-db-${{ github.run_id }}
          restore-keys: |
            news-signal-db-

      - name: Run impact calculator
        env:
          PYTHONUNBUFFERED: "1"
        run: python -c "from price.impact_calculator import run; run()"

      - name: Run sheets sync
        env:
          PYTHONUNBUFFERED: "1"
          SHEETS_ID:           ${{ secrets.SHEETS_ID }}
          GOOGLE_CREDENTIALS:  ${{ secrets.GOOGLE_CREDENTIALS }}
        run: python -c "from storage.sheets_sync import run_sheets_sync; run_sheets_sync()"

      - name: Upload DB artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: news-signal-db-impact
          path: data/news_signal.sqlite3
          if-no-files-found: warn
          retention-days: 7
