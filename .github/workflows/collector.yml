name: collector

on:
  schedule:
    # 15分ごとに main.py を実行
    - cron: "*/15 * * * *"
  workflow_dispatch:

concurrency:
  group: collector
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Restore SQLite DB (cache)
        uses: actions/cache@v4
        with:
          path: data/news_signal.sqlite3
          key: news-signal-db-${{ github.run_id }}
          restore-keys: |
            news-signal-db-

      - name: Run collector
        env:
          PYTHONUNBUFFERED: "1"
          # Phase 1 以降の Telegram 通知用（未設定でも Phase 0 は動く）
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py

      - name: Upload DB artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: news-signal-db
          path: data/news_signal.sqlite3
          if-no-files-found: warn
          retention-days: 7
